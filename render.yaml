services:
  - type: web
    name: qbids-ru
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run db:push && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: TZ
        value: Asia/Bishkek
